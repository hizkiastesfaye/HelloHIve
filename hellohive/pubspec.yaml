name: hellohive
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  # Service locator
  get_it: ^7.6.7
  # Bloc for state management
  flutter_bloc: ^8.1.6
  # Value equality
  equatable: ^2.0.5
  # Functional programming thingies
  dartz: ^0.10.1
  # Remote API
  # connectivity: ^6.0.5
  connectivity_plus: ^4.0.2
  http: ^1.2.2
  # Local cache
  shared_preferences: ^2.3.3
  internet_connection_checker: ^1.0.0
  firebase_core: ^3.4.0 
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.3.0
  firebase_database: ^11.0.0
  firebase_storage: ^12.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  mockito: ^5.4.4
  bloc_test: ^9.1.7
  build_runner: ^2.4.11
  flutter_lints: ^6.0.0
  image_picker: ^1.0.4
  intl: ^0.20.2 
flutter:
  uses-material-design: true
  assets: 
   - assets/images/
   - assets/icons/